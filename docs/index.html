<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Convert JSON to XML format. Bidirectional conversion with validation.">
<meta name="keywords" content="json to xml, json converter, xml generator, data format">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y=".9em" font-size='90'>🛠</text></svg>">
<title>JSON to XML — DevKit Tools</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--text2:#8b949e;--accent:#58a6ff;--radius:6px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;}
.header a{color:var(--text);text-decoration:none;font-weight:600;font-size:14px;}
.container{max-width:800px;margin:0 auto;padding:32px 24px;flex:1;width:100%;}
h1{font-size:28px;font-weight:700;margin-bottom:8px;color:#f0f6fc;}
.subtitle{color:var(--text2);font-size:14px;margin-bottom:32px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.card h2{font-size:16px;margin-bottom:12px;}
textarea,input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;color:var(--text);font-size:13px;font-family:monospace;resize:vertical;}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--accent);}
.btn{background:#238636;color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-size:13px;cursor:pointer;}
.btn:hover{background:#2ea043;}
.btn.secondary{background:var(--surface);border:1px solid var(--border);color:var(--text);}
.output{margin-top:12px;word-break:break-all;min-height:40px;}
.footer{text-align:center;padding:24px;color:var(--text2);font-size:12px;border-top:1px solid var(--border);}
.footer a{color:var(--accent);text-decoration:none;}
.label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500;}
*:focus-visible{outline:2px solid #58a6ff;outline-offset:2px}::selection{background:rgba(88,166,255,0.3);color:#fff}</style>
</head>
<body>
<div class="header">
  <a href="https://devkit-tools.xyz">← DevKit Tools</a>
  <span style="color:var(--text2);font-size:13px;">JSON to XML</span>
</div>
<div class="container">
  <h1>JSON to XML</h1>
  <p class="subtitle">Convert JSON to XML format. Bidirectional conversion with validation.</p>
  <div class="card">
    <h2>Tool</h2>
    <div id="tool-area">
      <label class="label">Input</label>
      <textarea id="input" rows="8" placeholder="{&quot;root&quot;:{&quot;name&quot;:&quot;John&quot;,&quot;age&quot;:30}}"></textarea>
      <button class="btn" onclick="process()" style="margin-top:8px;">Convert</button>
      <label class="label" style="margin-top:12px;">Output</label>
      <textarea id="output" rows="6" readonly></textarea>
    </div>
  </div>
</div>
<div class="footer">
  <a href="https://devkit-tools.xyz/privacy">Privacy</a> ·
  <a href="https://devkit-tools.xyz/terms">Terms</a> ·
  © 2026 DevKit Tools
</div>
<script>
'use strict';
function jsonToXml(obj,root="root"){let x="<"+root+">";for(const[k,v]of Object.entries(obj)){if(typeof v==="object"&&v!==null){x+=jsonToXml(v,k)}else{x+="<"+k+">"+v+"</"+k+">"}}x+="</"+root+">";return x}
function process(){try{const j=JSON.parse(document.getElementById("input").value);document.getElementById("output").value=jsonToXml(j)}catch(e){document.getElementById("output").value="Invalid JSON: "+e.message}}
  const v = document.getElementById('input').value;
  document.getElementById('output').value = ;
}
</script>
</body>
</html>
